services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./docs:/app/docs:ro
    environment:
      - DOCS_PATH=/app/docs
      - TOP_K=5
      - CHUNK_SIZE=150
      - OVERLAP=20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
