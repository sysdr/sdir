server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: app_logs
          __path__: /var/log/app/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            trace_id: trace_id
            duration_ms: duration_ms
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: high_cardinality_test
    static_configs:
      - targets:
          - localhost
        labels:
          job: cardinality_test
          __path__: /var/log/app/cardinality*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
      - labels:
          level:
          service:
